{% extends 'base.html' %}
{% block content %}
<h1>Profile</h1>


    <br>
    <a href="{% url 'create-post' %}">Create Post</a>
    <a href="{% url 'user' %}">Update</a>

    {% for post in posts %}

        <h4>{{post.desc}}</h4>
        <hr>

    {% endfor %}
{% endblock %}

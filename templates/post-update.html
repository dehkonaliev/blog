{% extends 'base.html' %}

{% block content %}
<!-- Include Tailwind CSS via CDN for instant utility styling and preview compatibility -->
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<div class="min-h-screen bg-slate-50 py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
    <!-- Sophisticated background accent gradients -->
    <div class="absolute top-0 right-1/4 w-96 h-96 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
    <div class="absolute bottom-10 left-1/4 w-96 h-96 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse delay-1000"></div>

    <div class="max-w-2xl mx-auto relative z-10">
        <!-- Navigation Back Link -->
        <div class="mb-8 font-semibold">
            <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-sm text-slate-500 hover:text-slate-800 transition-colors">
                <i class="fas fa-arrow-left text-xs"></i> Back to Profile
            </a>
        </div>

        <!-- Form Card Container -->
        <div class="bg-white rounded-3xl border border-slate-150 shadow-sm overflow-hidden">
            <!-- Form Header Decorator (Warm Amber & Violet to signal Edit/Modify mode) -->
            <div class="h-2 bg-gradient-to-r from-amber-500 via-indigo-500 to-violet-600"></div>
            
            <div class="p-8 sm:p-10">
                <!-- Branding / Title Marker -->
                <div class="flex items-center gap-4 mb-8">
                    <div class="h-12 w-12 rounded-2xl bg-amber-50 flex items-center justify-center text-amber-600">
                        <i class="fas fa-edit text-xl"></i>
                    </div>
                    <div class="flex-grow">
                        <div class="flex items-center gap-2">
                            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Edit Publication</h1>
                            <span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-amber-50 text-amber-700 border border-amber-100 uppercase tracking-wider">
                                Edit Mode
                            </span>
                        </div>
                        <p class="text-sm text-slate-500 mt-0.5">Modify the title, description, and contents of your story.</p>
                    </div>
                </div>

                <!-- Form Element (Enctype enabled for file/image uploads) -->
                <form method="POST" enctype="multipart/form-data" id="django-dynamic-form" class="space-y-6">
                    {% csrf_token %}

                    <!-- Global Non-Field Errors -->
                    {% if form.non_field_errors %}
                        <div class="p-4 rounded-xl bg-rose-50 border border-rose-100 text-rose-700 text-sm">
                            {{ form.non_field_errors }}
                        </div>
                    {% endif %}

                    <!-- Dynamic Django Fields Wrapper -->
                    <div class="django-fields-container">
                        {{ form.as_p }}
                    </div>

                    <!-- Actions Bar -->
                    <div class="pt-6 border-t border-slate-100 flex items-center justify-end gap-3">
                        <a href="javascript:history.back()" class="px-5 py-3 rounded-2xl text-sm font-bold text-slate-500 hover:text-slate-700 hover:bg-slate-50 transition-all duration-150">
                            Cancel
                        </a>
                        <button type="submit" class="inline-flex items-center gap-2 px-6 py-3 rounded-2xl text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] shadow-md shadow-indigo-100 transition-all duration-150">
                            Save Changes <i class="fas fa-save text-xs"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Scoped CSS explicitly formatting dynamically injected Django Form fields -->
<style>
    /* Spacing between Django paragraph form fields */
    #django-dynamic-form p {
        margin-bottom: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }
    
    /* Format Labels */
    #django-dynamic-form label {
        font-size: 0.875rem;
        font-weight: 700;
        color: #0f172a; /* slate-900 */
    }
    
    /* Format standard Inputs (Text, Password, Email, URLs, etc) */
    #django-dynamic-form input[type="text"],
    #django-dynamic-form input[type="url"],
    #django-dynamic-form input[type="email"],
    #django-dynamic-form input:not([type="checkbox"]):not([type="file"]) {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 0.875rem;
        border: 1px solid #e2e8f0; /* slate-200 */
        font-size: 0.9375rem;
        color: #1e293b; /* slate-800 */
        background-color: #ffffff;
        outline: none;
        transition: all 150ms ease-in-out;
    }

    /* Focus states for standard inputs */
    #django-dynamic-form input:not([type="checkbox"]):not([type="file"]):focus,
    #django-dynamic-form textarea:focus {
        border-color: #6366f1; /* indigo-500 */
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }

    /* Style Body Textareas (specifically for long post text body) */
    #django-dynamic-form textarea {
        width: 100%;
        min-height: 220px;
        padding: 1rem;
        border-radius: 0.875rem;
        border: 1px solid #e2e8f0;
        font-size: 0.9375rem;
        color: #1e293b;
        outline: none;
        resize: vertical;
        transition: all 150ms ease-in-out;
    }

    /* Modern Style file uploads if editing a post with a cover image */
    #django-dynamic-form input[type="file"] {
        padding: 0.5rem;
        border-radius: 0.875rem;
        border: 1px dashed #cbd5e1; /* slate-300 */
        background-color: #f8fafc; /* slate-50 */
        cursor: pointer;
        font-size: 0.875rem;
    }

    /* Error and helper label support */
    #django-dynamic-form .helptext {
        font-size: 0.75rem;
        color: #64748b; /* slate-500 */
        margin-top: 0.25rem;
    }

    #django-dynamic-form .errorlist {
        background-color: #fef2f2; /* rose-50 */
        border: 1px solid #fecdd3; /* rose-200 */
        color: #be123c; /* rose-700 */
        font-size: 0.8125rem;
        font-weight: 600;
        border-radius: 0.75rem;
        padding: 0.5rem 1rem;
        margin-bottom: 0.5rem;
        list-style-type: none;
    }
</style>
{% endblock %}

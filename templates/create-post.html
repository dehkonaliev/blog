{% extends 'base.html' %}

{% block title %}Create New Publication - NajotForbes{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-8">
    
    <!-- Top Return Anchor -->
    <div class="mb-6">
        <a href="{% url 'home' %}" class="inline-flex items-center gap-2 text-sm text-gray-400 hover:text-white transition-colors group">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 transform group-hover:-translate-x-1 transition-transform">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
            </svg>
            Cancel and return
        </a>
    </div>

    <!-- Main Creation Form Card -->
    <div class="relative bg-[#111726]/60 backdrop-blur-xl border border-gray-800/80 rounded-3xl p-6 md:p-10 shadow-[0_8px_30px_rgba(0,0,0,0.4)] overflow-hidden">
        
        <!-- Subtle back glowing sphere -->
        <div class="absolute -top-12 -right-12 w-48 h-48 bg-indigo-500/10 rounded-full blur-[60px] pointer-events-none"></div>

        <!-- Form Header Area -->
        <div class="mb-8 relative z-10">
            <h2 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight">
                Publish a New Story
            </h2>
            <p class="text-gray-400 text-xs md:text-sm mt-1">
                Share your unique perspective, analysis, and ideas with the NajotForbes community.
            </p>
        </div>

        <!-- Internal styling injection to map raw Django form fields to Dark Premium Theme UI -->
        <style>
            .django-create-form p {
                margin-bottom: 1.5rem;
            }
            .django-create-form label {
                display: block;
                font-size: 0.875rem;
                font-weight: 600;
                color: #e5e7eb; /* gray-200 */
                margin-bottom: 0.5rem;
            }
            /* Universal input field styling */
            .django-create-form input[type="text"],
            .django-create-form input[type="email"],
            .django-create-form input[type="password"],
            .django-create-form input[type="url"],
            .django-create-form input[type="number"],
            .django-create-form textarea,
            .django-create-form select {
                width: 100%;
                background-color: rgba(17, 24, 39, 0.6);
                border: 1px solid rgba(75, 85, 99, 0.4);
                border-radius: 1rem;
                padding: 0.875rem 1.25rem;
                color: #f3f4f6;
                font-size: 0.95rem;
                line-height: 1.5;
                transition: all 0.25s ease;
            }
            .django-create-form input[type="text"]:focus,
            .django-create-form textarea:focus,
            .django-create-form select:focus {
                outline: none;
                border-color: #6366f1; /* Indigo focus border */
                box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
                background-color: rgba(17, 24, 39, 0.8);
            }
            /* Clean placeholder styling */
            .django-create-form ::placeholder {
                color: #6b7280;
            }
            /* Custom styled File selector layout */
            .django-create-form input[type="file"] {
                display: block;
                width: 100%;
                font-size: 0.875rem;
                color: #9ca3af;
                background: rgba(17, 24, 39, 0.4);
                border: 1.5px dashed rgba(75, 85, 99, 0.6);
                padding: 0.75rem 1rem;
                border-radius: 1rem;
                cursor: pointer;
                transition: all 0.25s;
            }
            .django-create-form input[type="file"]:hover {
                border-color: rgba(99, 102, 241, 0.5);
                background: rgba(17, 24, 39, 0.6);
            }
            .django-create-form input[type="file"]::file-selector-button {
                margin-right: 1rem;
                border: 0;
                background: #4f46e5;
                padding: 0.4rem 0.875rem;
                border-radius: 0.5rem;
                color: #ffffff;
                cursor: pointer;
                font-weight: 600;
                transition: background 0.2s;
            }
            .django-create-form input[type="file"]::file-selector-button:hover {
                background: #4338ca;
            }
            /* Checkbox UI */
            .django-create-form input[type="checkbox"] {
                width: 1.25rem;
                height: 1.25rem;
                border-radius: 0.375rem;
                background-color: rgba(17, 24, 39, 0.6);
                border: 1px solid rgba(75, 85, 99, 0.4);
                accent-color: #6366f1;
                cursor: pointer;
                vertical-align: middle;
            }
            /* Error List Display inside Django fields */
            .django-create-form .errorlist {
                background: rgba(239, 68, 68, 0.1);
                border: 1px solid rgba(239, 68, 68, 0.2);
                border-radius: 0.75rem;
                padding: 0.5rem 1rem;
                margin-bottom: 0.75rem;
                color: #f87171;
                font-size: 0.825rem;
                list-style-type: none;
            }
            .django-create-form .helptext {
                display: block;
                font-size: 0.75rem;
                color: #6b7280;
                margin-top: 0.35rem;
            }
        </style>

        <form method="POST" enctype="multipart/form-data" class="django-create-form relative z-10">
            {% csrf_token %}
            
            <!-- Django Form Output wrapper -->
            {{ form.as_p }}

            <!-- Form Action Triggers -->
            <div class="mt-8 pt-6 border-t border-gray-800/80 flex flex-col sm:flex-row items-center justify-end gap-3">
                
                <!-- Cancel Link -->
                <a href="{% url 'profile' %}" class="w-full sm:w-auto text-center px-6 py-3 rounded-xl text-sm font-semibold text-gray-400 hover:text-white bg-transparent border border-gray-800/80 hover:bg-gray-800/40 transition-all duration-200">
                    Cancel
                </a>

                <!-- Submit Button -->
                <button type="submit" class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-500 active:scale-[0.98] transition-all duration-200 shadow-[0_4px_15px_rgba(79,70,229,0.2)] hover:shadow-[0_4px_20px_rgba(79,70,229,0.4)]">
                    Create Story
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                </button>
            </div>
        </form>

    </div>
</div>
{% endblock %}

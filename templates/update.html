{% extends 'base.html' %}

{% block extra_head %}
<!-- Optional extra head elements can go here -->
{% endblock %}

{% block content %}
<!-- Main Profile Update Card Wrapper -->
<div class="relative w-full max-w-lg mx-auto bg-[#111726]/60 backdrop-blur-xl border border-gray-800/80 rounded-3xl p-8 md:p-10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] overflow-hidden my-8">
    
    <!-- Ambient glowing back spheres -->
    <div class="absolute -top-16 -right-16 w-40 h-40 bg-indigo-500/10 rounded-full blur-[50px] pointer-events-none"></div>
    <div class="absolute -bottom-16 -left-16 w-40 h-40 bg-purple-500/5 rounded-full blur-[50px] pointer-events-none"></div>

    <!-- Header Block -->
    <div class="text-center mb-8 relative z-10">
        <h2 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight leading-tight">
            Update Profile
        </h2>
        <p class="text-gray-400 text-xs md:text-sm mt-2 leading-relaxed">
            Refine your public creator persona, avatar, and credentials.
        </p>
    </div>

    <!-- Django Form Field Overrides for Premium Theme -->
    <style>
        .django-update-form p {
            margin-bottom: 1.5rem;
        }
        .django-update-form label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #9ca3af; /* gray-400 */
            margin-bottom: 0.375rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        /* Style standard inputs */
        .django-update-form input[type="text"],
        .django-update-form input[type="email"],
        .django-update-form input[type="password"],
        .django-update-form input[type="url"],
        .django-update-form input[type="number"],
        .django-update-form textarea,
        .django-update-form select {
            width: 100%;
            background-color: rgba(17, 24, 39, 0.6);
            border: 1px solid rgba(75, 85, 99, 0.4);
            border-radius: 0.875rem;
            padding: 0.75rem 1.125rem;
            color: #f3f4f6;
            font-size: 0.95rem;
            transition: all 0.25s ease;
        }
        .django-update-form input[type="text"]:focus,
        .django-update-form input[type="email"]:focus,
        .django-update-form textarea:focus,
        .django-update-form select:focus {
            outline: none;
            border-color: #6366f1; /* Indigo focus ring */
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
            background-color: rgba(17, 24, 39, 0.85);
        }
        /* Style django file fields for profile pictures */
        .django-update-form input[type="file"] {
            display: block;
            width: 100%;
            font-size: 0.8125rem;
            color: #9ca3af;
            background: rgba(17, 24, 39, 0.4);
            border: 1.5px dashed rgba(75, 85, 99, 0.6);
            padding: 0.75rem 1rem;
            border-radius: 0.875rem;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .django-update-form input[type="file"]:hover {
            border-color: rgba(99, 102, 241, 0.5);
        }
        .django-update-form input[type="file"]::file-selector-button {
            margin-right: 0.75rem;
            border: 0;
            background: #4f46e5;
            padding: 0.35rem 0.75rem;
            border-radius: 0.5rem;
            color: #ffffff;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            transition: background 0.2s;
        }
        .django-update-form input[type="file"]::file-selector-button:hover {
            background: #4338ca;
        }
        /* Style check boxes (e.g., clear image checkbox) */
        .django-update-form input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            border-radius: 0.25rem;
            background-color: rgba(17, 24, 39, 0.6);
            border: 1px solid rgba(75, 85, 99, 0.4);
            accent-color: #6366f1;
            cursor: pointer;
            vertical-align: middle;
            margin-right: 0.5rem;
        }
        /* Style django error elements */
        .django-update-form .errorlist {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 0.75rem;
            padding: 0.5rem 1rem;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            color: #f87171;
            font-size: 0.825rem;
            list-style-type: none;
        }
        /* Form helper parameters styling */
        .django-update-form .helptext {
            display: block;
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 0.4rem;
            line-height: 1.4;
        }
    </style>

    <form method="POST" enctype="multipart/form-data" class="django-update-form relative z-10">
        {% csrf_token %}
        
        <!-- Global non-field validation errors -->
        {% if form.non_field_errors %}
            <div class="bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl p-3.5 mb-5 text-sm">
                {{ form.non_field_errors }}
            </div>
        {% endif %}

        <!-- Raw Django form output -->
        {{ form.as_p }}

        <!-- Interactive form actions -->
        <div class="mt-8 pt-6 border-t border-gray-800/60 flex flex-col sm:flex-row items-center justify-end gap-3">
            
            <!-- Cancel Button -->
            <a href="{% url 'profile' %}" class="w-full sm:w-auto text-center px-6 py-3 rounded-xl text-sm font-semibold text-gray-400 hover:text-white bg-transparent border border-gray-800/80 hover:bg-gray-800/40 transition-all duration-200">
                Cancel
            </a>

            <!-- Save Button -->
            <button type="submit" class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-500 active:scale-[0.98] transition-all duration-200 shadow-[0_4px_15px_rgba(79,70,229,0.2)] hover:shadow-[0_4px_20px_rgba(79,70,229,0.4)]">
                Save Changes
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                </svg>
            </button>
            
        </div>
    </form>

</div>
{% endblock %}
